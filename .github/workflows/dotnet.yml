# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Run tests on PR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore --locked-mode
      working-directory: ./src
    - name: Build
      run: dotnet build --no-restore
      working-directory: ./src
    # Unit and integration tests are separated by the "Integration" test category so each is
    # reported as its own step; both gate the PR. --ignore-exit-code 8 absorbs the exit code
    # Microsoft.Testing.Platform returns when a project in the solution matches zero tests under
    # the filter (e.g. the integration project during the unit run, and vice versa).
    - name: Run unit tests
      run: dotnet test --no-build --verbosity normal -- --filter "TestCategory!=Integration" --ignore-exit-code 8
      working-directory: ./src
    - name: Run integration tests
      run: dotnet test --no-build --verbosity normal -- --filter "TestCategory=Integration" --ignore-exit-code 8
      working-directory: ./src
